name: Haya
options:
  bundleIdPrefix: com.haya
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

packages:
  mlx-swift-lm:
    url: https://github.com/ml-explore/mlx-swift-lm
    exactVersion: "2.30.6"

targets:
  Haya:
    type: application
    platform: iOS
    sources:
      - path: Haya
        excludes:
          - "*.entitlements"
    dependencies:
      - package: mlx-swift-lm
        product: MLXLLM
      - package: mlx-swift-lm
        product: MLXVLM
      - package: mlx-swift-lm
        product: MLXLMCommon
      - sdk: Accelerate.framework
      - sdk: Vision.framework
      - sdk: CoreML.framework
      - sdk: Photos.framework
      - sdk: PhotosUI.framework
      - sdk: LocalAuthentication.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.haya.app
        INFOPLIST_FILE: Haya/Info.plist
        CODE_SIGN_ENTITLEMENTS: Haya/Haya.entitlements
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_BITCODE: false
      configs:
        debug:
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: "DEBUG"
        release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"
    entitlements:
      path: Haya/Haya.entitlements

  HayaTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: HayaTests
    dependencies:
      - target: Haya
    settings:
      base:
        SWIFT_VERSION: "5.9"

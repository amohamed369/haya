name: Build Unsigned IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Cache SPM packages
        uses: actions/cache@v4
        id: spm-cache
        with:
          path: SourcePackages
          key: spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            spm-

      - name: Resolve SPM dependencies
        if: steps.spm-cache.outputs.cache-hit != 'true'
        timeout-minutes: 20
        run: |
          xcodebuild -resolvePackageDependencies \
            -project Haya.xcodeproj \
            -scheme Haya \
            -clonedSourcePackagesDirPath SourcePackages

      - name: Build unsigned archive
        timeout-minutes: 40
        run: |
          xcodebuild archive \
            -project Haya.xcodeproj \
            -scheme Haya \
            -archivePath build/Haya.xcarchive \
            -sdk iphoneos \
            -configuration Release \
            -clonedSourcePackagesDirPath SourcePackages \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r build/Haya.xcarchive/Products/Applications/Haya.app Payload/
          zip -r Haya.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Haya-IPA
          path: Haya.ipa
          retention-days: 14
